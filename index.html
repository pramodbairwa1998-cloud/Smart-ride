<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>SmartRide Pro</title>
</head>
<body>
    <header>
        <h1>SmartRide Pro</h1>
    </header>
    <main>
        <section id="vehicle-selector">
            <h2>Select Your Vehicle</h2>
            <select id="vehicle-options">
                <option value="car">Car</option>
                <option value="bike">Bike</option>
                <option value="suv">SUV</option>
            </select>
        </section>
        <section id="interactive-map">
            <h2>Map</h2>
            <div id="map"></div>
        </section>
        <section id="driver-info">
            <h2>Driver Information</h2>
            <div id="driver-details">
                <p>Name: John Doe</p>
                <p>Rating: 4.9</p>
            </div>
        </section>
        <section id="price-breakdown">
            <h2>Price Breakdown</h2>
            <p id="price">$20.00</p>
        </section>
        <section id="ad-space">
            <h2>Advertisements</h2>
            <div class="ad">Ad Space 1</div>
            <div class="ad">Ad Space 2</div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 SmartRide Pro. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
